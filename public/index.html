<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>KiloStash</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-icon">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2.5"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>KiloStash</h1>
    <p class="login-subtitle">Personal Cloud Storage</p>
    <input type="password" id="passwordInput" placeholder="Password" class="login-input" autocomplete="current-password">
    <button id="loginBtn" class="btn-primary">Masuk</button>
    <p id="loginError" class="login-error"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <button id="backBtn" class="btn-icon hidden" title="Kembali">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <svg class="header-logo" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L3 7v10l9 5 9-5V7z"/><path d="M3 7l9 5 9-5"/><path d="M12 12v10"/>
        </svg>
        <h2 id="siteName">KiloStash</h2>
      </div>
      <div class="header-right">
        <button id="searchBtn" class="btn-icon" title="Cari">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button id="settingsBtn" class="btn-icon" title="Pengaturan">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="logoutBtn" class="btn-icon" title="Keluar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Breadcrumb -->
  <div id="breadcrumb" class="breadcrumb">
    <div class="breadcrumb-inner">
      <span class="crumb" data-folder="/">Beranda</span>
    </div>
  </div>

  <!-- Search bar -->
  <div id="searchBar" class="search-bar hidden">
    <div class="search-inner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Cari file..." autocomplete="off">
      <button id="searchClose" class="btn-icon" title="Tutup"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  </div>

  <!-- Upload zone -->
  <div id="dropZone" class="drop-zone">
    <div class="drop-zone-inner">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p class="drop-zone-title">Tarik file ke sini</p>
      <p class="drop-zone-subtitle">atau klik untuk pilih</p>
      <input type="file" id="fileInput" multiple class="hidden">
      <button id="newFolderBtn" class="btn-secondary">+ Folder Baru</button>
    </div>
  </div>

  <!-- Upload progress -->
  <div id="uploadProgress" class="upload-progress hidden"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <span id="fileCount" class="toolbar-count">0 item</span>
      <button id="selectAllBtn" class="btn-text hidden">Pilih Semua</button>
    </div>
    <div class="toolbar-right">
      <select id="sortSelect" class="sort-select">
        <option value="name-asc">Nama (A-Z)</option>
        <option value="name-desc">Nama (Z-A)</option>
        <option value="date-desc" selected>Terbaru</option>
        <option value="date-asc">Terlama</option>
        <option value="size-desc">Terbesar</option>
        <option value="size-asc">Terkecil</option>
      </select>
      <div class="view-toggle">
        <button id="gridViewBtn" class="view-btn active" title="Grid"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></button>
        <button id="listViewBtn" class="view-btn" title="List"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
      </div>
    </div>
  </div>

  <!-- Bulk actions bar -->
  <div id="bulkBar" class="bulk-bar hidden">
    <span id="bulkCount">0 dipilih</span>
    <button id="bulkDownload" class="btn-text">Download</button>
    <button id="bulkDelete" class="btn-text danger">Hapus</button>
    <button id="bulkCancel" class="btn-text">Batal</button>
  </div>

  <!-- Files -->
  <main class="main">
    <div id="emptyState" class="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p class="empty-title">Belum ada file</p>
      <p class="empty-subtitle">Upload file pertama untuk mulai</p>
    </div>
    <div id="fileGrid" class="file-grid"></div>
    <div id="fileList" class="file-list hidden"></div>
  </main>

  <!-- Storage bar -->
  <div class="storage-bar">
    <div class="storage-bar-inner">
      <div class="storage-bar-track">
        <div id="storageBarFill" class="storage-bar-fill" style="width:0%"></div>
      </div>
      <span id="storageText" class="storage-text">0 B / 10 GB</span>
    </div>
  </div>
</div>

<!-- PREVIEW MODAL -->
<div id="previewModal" class="modal hidden">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-content">
    <div class="modal-header">
      <span id="previewName" class="modal-title"></span>
      <div class="modal-actions">
        <button id="previewDownload" class="btn-icon" title="Download"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        <button id="previewShare" class="btn-icon" title="Share"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
        <button class="btn-icon" data-close title="Tutup"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>
    <div id="previewBody" class="modal-body"></div>
  </div>
</div>

<!-- SHARE MODAL -->
<div id="shareModal" class="modal hidden">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-content modal-small">
    <div class="modal-header">
      <span class="modal-title">Share Link</span>
      <button class="btn-icon" data-close><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body share-body">
      <label class="share-label">Tipe Share</label>
      <div class="share-options">
        <label class="radio-label"><input type="radio" name="shareType" value="preview" checked> Preview (lihat langsung)</label>
        <label class="radio-label"><input type="radio" name="shareType" value="download"> Download langsung</label>
      </div>
      <label class="share-label">Kedaluwarsa</label>
      <select id="shareExpires" class="sort-select">
        <option value="0">Tidak pernah</option>
        <option value="1">1 jam</option>
        <option value="24">1 hari</option>
        <option value="168">7 hari</option>
        <option value="720">30 hari</option>
      </select>
      <button id="createShareBtn" class="btn-primary" style="margin-top:16px">Buat Link</button>
      <div id="shareResult" class="share-result hidden">
        <input id="shareUrl" class="login-input" readonly>
        <button id="copyShareBtn" class="btn-primary" style="margin-top:8px">Salin Link</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-content modal-small">
    <div class="modal-header">
      <span class="modal-title">Pengaturan</span>
      <button class="btn-icon" data-close><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body settings-body">
      <h3 class="settings-section">Ganti Password</h3>
      <input type="password" id="currentPw" placeholder="Password lama" class="login-input">
      <input type="password" id="newPw" placeholder="Password baru" class="login-input">
      <input type="password" id="confirmPw" placeholder="Konfirmasi password baru" class="login-input">
      <button id="changePwBtn" class="btn-primary">Ganti Password</button>
      <p id="pwMsg" class="settings-msg"></p>

      <hr class="settings-divider">

      <h3 class="settings-section">Share Links Aktif</h3>
      <div id="shareLinksList" class="share-links-list"></div>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="contextMenu" class="context-menu hidden">
  <button data-action="preview" class="ctx-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Lihat</button>
  <button data-action="download" class="ctx-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download</button>
  <button data-action="rename" class="ctx-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Rename</button>
  <button data-action="share" class="ctx-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share</button>
  <button data-action="delete" class="ctx-item danger"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Hapus</button>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="/app.js"></script>
</body>
</html>
