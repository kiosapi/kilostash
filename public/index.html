<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>KiloStash</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="/styles.css">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
</head>
<body>
  <!-- Login screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2.5"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>KiloStash</h1>
      <p class="login-subtitle">Personal Cloud Storage</p>
      <input type="password" id="passwordInput" placeholder="Password" class="login-input" autocomplete="current-password">
      <button id="loginBtn" class="btn-primary">Masuk</button>
      <p id="loginError" class="login-error"></p>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" class="app hidden">
    <header class="header">
      <div class="header-inner">
        <div class="header-left">
          <svg class="header-logo" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L3 7v10l9 5 9-5V7z"/>
            <path d="M3 7l9 5 9-5"/>
            <path d="M12 12v10"/>
          </svg>
          <h2>KiloStash</h2>
        </div>
        <div class="header-right">
          <span id="storageInfo" class="storage-info"></span>
          <button id="logoutBtn" class="btn-icon" title="Keluar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Upload zone -->
    <div id="dropZone" class="drop-zone">
      <div class="drop-zone-inner">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="drop-zone-title">Tarik file ke sini</p>
        <p class="drop-zone-subtitle">atau klik untuk pilih file</p>
        <input type="file" id="fileInput" multiple class="file-input-hidden">
      </div>
    </div>

    <!-- Upload progress -->
    <div id="uploadProgress" class="upload-progress hidden"></div>

    <!-- File list -->
    <main class="main">
      <div class="files-header">
        <h3 id="fileCount">File</h3>
        <div class="view-toggle">
          <button id="gridViewBtn" class="view-btn active" title="Grid">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </button>
          <button id="listViewBtn" class="view-btn" title="List">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <p class="empty-title">Belum ada file</p>
        <p class="empty-subtitle">Upload file pertama untuk mulai</p>
      </div>

      <div id="fileGrid" class="file-grid"></div>
      <div id="fileList" class="file-list hidden"></div>
    </main>
  </div>

  <!-- Preview modal -->
  <div id="previewModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closePreview()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span id="previewName" class="modal-title"></span>
        <button class="btn-icon" onclick="closePreview()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="previewBody" class="modal-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
